{% extends "base.html" %}

{% block content %}
<div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-6">
    <div>
        <h1 class="text-3xl font-bold text-on-surface tracking-tight">Novo Comentário</h1>
        <p class="text-sm text-secondary mt-1">Compartilhe sua opinião sobre o material didático</p>
    </div>
    <a href="{{ url_for('comentarios.listar') }}" class="text-secondary hover:text-primary transition-colors flex items-center gap-1">
        <span class="material-symbols-outlined text-sm">arrow_back</span>
        Voltar
    </a>
</div>

<div class="max-w-3xl mx-auto">
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm overflow-hidden">
        <div class="p-6 border-b border-outline-variant bg-surface-container-low">
            <h3 class="font-semibold text-on-surface flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">chat</span>
                Publicar Comentário
            </h3>
        </div>
        <form method="POST" class="p-6 space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-medium text-on-surface-variant mb-1">Material *</label>
                    <select name="id_material" required class="w-full px-3 py-2 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface transition-all text-sm">
                        <option value="">Selecione...</option>
                        {% for m in materiais %}
                        <option value="{{ m.id_material }}">{{ m.titulo }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-on-surface-variant mb-1">Autor *</label>
                    <select name="id_usuario_autor" required class="w-full px-3 py-2 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface transition-all text-sm">
                        <option value="">Selecione...</option>
                        {% for u in usuarios %}
                        <option value="{{ u.id_usuario }}">{{ u.nome_completo }} ({{ u.tipo|capitalize }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-on-surface-variant mb-1">Comentário Pai (Opcional)</label>
                <select name="id_comentario_pai" class="w-full px-3 py-2 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface transition-all text-sm">
                    <option value="">Nenhum (comentário raiz)</option>
                    {% for c in comentarios_pai %}
                    <option value="{{ c.id_comentario }}">{{ c.autor.nome_completo }}: {{ c.texto[:50] }}...</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-on-surface-variant mb-1">Texto *</label>
                <textarea name="texto" required rows="6" class="w-full px-3 py-2 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface transition-all text-sm" placeholder="Escreva seu comentário aqui..."></textarea>
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t border-outline-variant">
                <a href="{{ url_for('comentarios.listar') }}" class="px-6 py-2 border border-outline-variant rounded-lg text-secondary hover:bg-surface-container-high transition-all">Cancelar</a>
                <button type="submit" class="px-6 py-2 bg-primary text-on-primary rounded-lg font-medium hover:opacity-90 transition-all shadow-sm flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">send</span>
                    Publicar Comentário
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
