{% extends "base.html" %}

{% block content %}
<div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-6">
    <div>
        <h1 class="text-3xl font-bold text-on-surface tracking-tight">{{ 'Editar Tag' if tag else 'Nova Tag' }}</h1>
        <p class="text-sm text-secondary mt-1">Cadastre uma tag para classificar materiais didáticos</p>
    </div>
    <a href="{{ url_for('tags.listar') }}" class="text-secondary hover:text-primary transition-colors flex items-center gap-1">
        <span class="material-symbols-outlined text-sm">arrow_back</span>
        Voltar
    </a>
</div>

<div class="max-w-2xl mx-auto">
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm overflow-hidden">
        <div class="p-6 border-b border-outline-variant bg-surface-container-low">
            <h3 class="font-semibold text-on-surface flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">sell</span>
                Informações da Tag
            </h3>
        </div>
        <form method="POST" class="p-6 space-y-5">
            <div>
                <label class="block text-sm font-medium text-on-surface-variant mb-1">Nome da Tag *</label>
                <input type="text" name="nome_tag" required class="w-full px-3 py-2 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface transition-all text-sm" value="{{ tag.nome_tag if tag else '' }}" placeholder="Ex: Prova, Exercício, Vídeo-aula...">
                <p class="text-xs text-secondary mt-1">Nome único que identificará a tag nos materiais</p>
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t border-outline-variant">
                <a href="{{ url_for('tags.listar') }}" class="px-6 py-2 border border-outline-variant rounded-lg text-secondary hover:bg-surface-container-high transition-all">Cancelar</a>
                <button type="submit" class="px-6 py-2 bg-primary text-on-primary rounded-lg font-medium hover:opacity-90 transition-all shadow-sm flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">save</span>
                    Salvar
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
